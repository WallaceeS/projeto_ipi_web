<nav class="navbar navbar-expand-lg shadow-sm mb-4" style="background-color: #552583; padding: 10px 0;">
  <div class="container-fluid px-3 px-md-5 d-flex align-items-center">
    
    <a class="navbar-brand m-0" routerLink="/vitrine" style="cursor: pointer;">
      <img src="/bola-icone.png" alt="Início" width="50" height="50">
    </a>

    <div class="d-flex align-items-center ms-auto me-3 order-lg-last">
      <a routerLink="/login" class="me-4 text-center text-decoration-none" style="color: #FDB927; cursor: pointer;">
        <img src="/login.png" alt="Login" width="25" height="25"><br>
        <span style="font-size: 0.7rem; font-weight: bold;">Entrar</span>
      </a>
      
      <a routerLink="/carrinho" class="text-center text-decoration-none" style="color: #FDB927; cursor: pointer;">
        @if (quantidadeItensCarrinho > 0) {
          <img src="/CarrinhoCheio.png" alt="Carrinho Cheio" width="25" height="25">
        } @else {
          <img src="/CarrinhoVazio.png" alt="Carrinho Vazio" width="25" height="25">
        }
        <br><span style="font-size: 0.7rem; font-weight: bold;">Carrinho</span>
      </a>
    </div>

    <button class="navbar-toggler" type="button" (click)="menuAberto = !menuAberto" style="background-color: #FDB927; border: none; padding: 5px;">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse mt-3 mt-lg-0" [class.show]="menuAberto">
      <ul class="navbar-nav mx-auto text-center mb-0">
        <li class="nav-item">
          <a class="nav-link text-white fw-bold" (click)="filtrarCategoria('Todos'); menuAberto = false" style="cursor: pointer;">Todos</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-light fw-bold" (click)="filtrarCategoria('Tênis'); menuAberto = false" style="cursor: pointer;">Tênis</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-light fw-bold" (click)="filtrarCategoria('Bolas'); menuAberto = false" style="cursor: pointer;">Bolas</a>
        </li>
      </ul>
    </div>

  </div>
</nav>

<div class="container">
  
  <div class="row mb-5 justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="input-group">
        <input type="text" class="form-control shadow-none py-2 border-2" style="border-color: #FDB927;"
               placeholder="O que você está procurando hoje?" 
               #caixaDeBusca (keyup)="buscar(caixaDeBusca.value)">
      </div>
    </div>
  </div>

  <div class="row justify-content-center">
    @for(obj of listaPesquisa; track obj.codigo) {
      <div class="col-12 col-sm-6 col-md-4 col-lg-3 mb-4 d-flex align-items-stretch">
        <div class="card w-100 shadow-sm border-0 product-card" (click)="redirecionar(obj)" style="cursor: pointer; transition: transform 0.2s;">
          
          <div class="p-3 text-center bg-light d-flex align-items-center justify-content-center" style="border-radius: 12px 12px 0 0; height: 200px;">
            <img [src]="'/' + obj.imagem" class="img-fluid" style="max-height: 160px; object-fit: contain;" alt="{{obj.nome}}">
          </div>
          
          <div class="card-body d-flex flex-column text-center">
            <h5 class="card-title fs-6 fw-bold text-dark mb-3">{{obj.nome}}</h5>
            <div class="mt-auto">
              <h4 class="fw-bold mb-3" style="color: #27ae60;">R$ {{obj.preco}}</h4>
              <button class="btn btn-sm w-100 text-white fw-bold py-2" style="background-color: #552583; border-radius: 8px;">
                Ver Detalhes
              </button>
            </div>
          </div>

        </div>
      </div>
    }
  </div>
</div>

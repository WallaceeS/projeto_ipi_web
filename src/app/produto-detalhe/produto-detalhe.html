<div class="container my-5">
    @if (produtoSelecionado) {
        <div class="row bg-white rounded-4 shadow-sm overflow-hidden" style="border: 1px solid #e0e0e0;">
            
            <div class="col-md-6 p-4 p-md-5 d-flex justify-content-center align-items-center" style="background-color: #f8f9fa;">
                <img [src]="'/' + produtoSelecionado.imagem" [alt]="produtoSelecionado.nome" class="img-fluid" style="max-height: 400px; object-fit: contain; transition: transform 0.3s ease;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
            </div>

            <div class="col-md-6 p-4 p-md-5 d-flex flex-column justify-content-center">
                <h1 style="font-weight: 800; color: #333; font-size: 2.2rem; margin-bottom: 10px;">
                    {{ produtoSelecionado.nome }}
                </h1>
                
                <h2 class="mb-4" style="color: #27ae60; font-weight: 800; font-size: 2.5rem;">
                    R$ {{ produtoSelecionado.preco }}
                </h2>

                <hr style="border-color: #e0e0e0;">

                <div class="mt-3 mb-4">
                    <h5 style="color: #552583; font-weight: bold; margin-bottom: 15px;">Sobre o produto</h5>
                    <p style="color: #555; line-height: 1.6; font-size: 1.05rem;">
                        {{ produtoSelecionado.descritivo }}
                    </p>
                </div>

                <div class="mt-auto pt-4">
                    <button (click)="clicar()" class="btn w-100 shadow-sm" style="background-color: #552583; color: #FDB927; font-weight: bold; font-size: 1.3rem; padding: 15px; border-radius: 8px; transition: background-color 0.2s;" onmouseover="this.style.backgroundColor='#401b63'" onmouseout="this.style.backgroundColor='#552583'">
                        <i class="fi fi-rr-shopping-cart me-2"></i> ADICIONAR AO CARRINHO
                    </button>
                </div>
            </div>

        </div>
    } @else {
        <div class="text-center p-5">
            <div class="spinner-border" style="color: #552583;" role="status"></div>
            <p class="mt-3" style="color: #552583; font-weight: bold;">Buscando detalhes do produto...</p>
        </div>
    }
</div>

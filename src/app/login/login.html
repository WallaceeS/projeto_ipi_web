<div class="login-background"> 
    <div class="container">
        <div class="row shadow p-4 p-md-5 bg-white rounded" style="border-top: 5px solid #FDB927; border-bottom: 5px solid #552583;">
            
            <div class="col-12 mb-3 text-start order-first">
                <a routerLink="/vitrine" style="cursor: pointer;" title="Voltar à Vitrine">
                    <img src="/bola-icone.png" alt="Início" width="50" height="50">
                </a>
            </div>

            <div class="col-md-6 divisoria order-1 order-md-1">
                <h3 class="mb-4" style="font-weight: bold; color: #552583;">Já sou cliente</h3>
                
                <label class="form-label" style="color: #552583; font-weight: bold;">E-mail</label>
                <input type="email" [(ngModel)]="obj.email" class="form-control mb-3" placeholder="Digite seu e-mail" style="border-color: #FDB927;">
                
                <label class="form-label" style="color: #552583; font-weight: bold;">Senha</label>
                <input type="password" [(ngModel)]="obj.senha" class="form-control mb-3" placeholder="Digite sua senha" style="border-color: #FDB927;">
                
                <button (click)="fazerLogin()" class="btn w-100 mb-3" style="background-color: #552583; color: #FDB927; font-weight: bold; font-size: 1.1rem;">
                    Acessar conta
                </button>

                @if (mensagemSucesso != "") {
                    <div class="alert alert-success mt-3" role="alert" style="text-align: center; font-weight: bold;">
                        {{ mensagemSucesso }}
                    </div>
                }

                @if (mensagem != "") {
                    <div class="alert alert-danger" role="alert" style="text-align: center;">
                        {{ mensagem }}
                    </div>
                }

                <p (click)="irParaRecuperacao()" style="cursor: pointer; color: #552583; text-decoration: underline; text-align: center; margin-top: 15px; font-weight: 500;">
                    Esqueci minha senha
                </p>
            </div>

            <div class="col-md-6 area-cadastro d-flex flex-column justify-content-center text-center order-2 order-md-2">
                <h3 class="mb-3" style="font-weight: bold; color: #552583;">Criar conta</h3>
                
                <p style="color: #333;">Ainda não tem cadastro? Crie sua conta agora para aproveitar nossas ofertas e finalizar suas compras!</p>
                
                <button routerLink="/cadastro" class="btn w-100 mt-2" style="background-color: #FDB927; color: #552583; border: 2px solid #552583; font-weight: bold; font-size: 1.1rem;">
                    Criar nova conta
                </button>
            </div>

        </div> 
    </div> 
</div>
